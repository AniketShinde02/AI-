<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core | Exact Shader Port</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            margin: 0;
        }
        .canvas-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ui-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            z-index: 10;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="canvas-container" id="canvas-mount"></div>

    <div class="ui-overlay">
        <!-- Top Info -->
        <div class="flex justify-between items-start">
            <div class="glass-panel p-8 w-80">
                <div class="text-[10px] tracking-[0.3em] text-cyan-400 font-bold mb-2 uppercase">Nexus Core Engine</div>
                <h1 class="text-3xl font-light tracking-tight mb-4">Iridescent Singularity</h1>
                <p class="text-xs text-zinc-500 leading-relaxed">
                    Ported with pixel-perfect fidelity from the primary component library. Using 3D Simplex noise and Fresnel rim lighting.
                </p>
            </div>
            
            <div class="flex flex-col gap-4">
                <div class="glass-panel px-6 py-4 flex items-center gap-4">
                    <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                    <span class="text-xs font-semibold tracking-widest uppercase">Kernel Verified</span>
                </div>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div class="flex justify-center">
            <div class="glass-panel p-2 flex items-center gap-2">
                <button class="px-8 py-4 bg-white text-black rounded-xl font-bold text-sm hover:bg-cyan-400 transition-colors">INITIATE SESSION</button>
                <button class="p-4 hover:bg-white/5 rounded-xl transition-colors">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="8"></circle><path d="M10 6v8M6 10h8"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script id="snoiseFunc" type="x-shader/x-vertex">
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

        float snoise(vec3 v) { 
          const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
          const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);

          vec3 i  = floor(v + dot(v, C.yyy) );
          vec3 x0 =   v - i + dot(i, C.xxx) ;

          vec3 g = step(x0.yzx, x0.xyz);
          vec3 l = 1.0 - g;
          vec3 i1 = min( g.xyz, l.zxy );
          vec3 i2 = max( g.xyz, l.zxy );

          vec3 x1 = x0 - i1 + C.xxx;
          vec3 x2 = x0 - i2 + C.yyy;
          vec3 x3 = x0 - D.yyy;

          i = mod289(i); 
          vec4 p = permute( permute( permute( 
                     i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                   + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                   + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

          float n_ = 1.0/7.0;
          vec3  ns = n_ * D.wyz - D.xzx;

          vec4 j = p - 49.0 * floor(p * ns.z * ns.z);

          vec4 x_ = floor(j * ns.z);
          vec4 y_ = floor(j - 7.0 * x_ );

          vec4 x = x_ *ns.x + ns.yyyy;
          vec4 y = y_ *ns.x + ns.yyyy;
          vec4 h = 1.0 - abs(x) - abs(y);

          vec4 b0 = vec4( x.xy, y.xy );
          vec4 b1 = vec4( x.zw, y.zw );

          vec4 s0 = floor(b0)*2.0 + 1.0;
          vec4 s1 = floor(b1)*2.0 + 1.0;
          vec4 sh = -step(h, vec4(0.0));

          vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
          vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

          vec3 p0 = vec3(a0.xy,h.x);
          vec3 p1 = vec3(a0.zw,h.y);
          vec3 p2 = vec3(a1.xy,h.z);
          vec3 p3 = vec3(a1.zw,h.w);

          vec4 sig = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
          p0 *= sig.x;
          p1 *= sig.y;
          p2 *= sig.z;
          p3 *= sig.w;

          vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
          m = m * m;
          return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), 
                                        dot(p2,x2), dot(p3,x3) ) );
        }
    </script>

    <script id="glassVertex" type="x-shader/x-vertex">
        uniform float uTime;
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        varying float vNoise;

        // Injected snoiseFunc here
        void main() {
          vNormal = normalize(normalMatrix * normal);
          float noise = snoise(position + uTime * 0.4);
          vNoise = noise;
          vec3 newPosition = position + normal * (vNoise * 0.12);
          vec4 mvPosition = modelViewMatrix * vec4(newPosition, 1.0);
          vViewPosition = -mvPosition.xyz;
          gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="glassFragment" type="x-shader/x-fragment">
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        varying float vNoise;

        void main() {
          vec3 normal = normalize(vNormal);
          vec3 viewDir = normalize(vViewPosition);
          float fresnel = pow(1.0 - dot(normal, viewDir), 3.0);
          float rim = pow(1.0 - dot(normal, viewDir), 5.0) * 2.0;
          float spec = pow(max(0.0, vNoise), 8.0) * 0.6;
          vec3 finalColor = vec3(1.0) * (rim + spec + fresnel * 0.5);
          float alpha = clamp(fresnel * 0.8 + spec * 0.5, 0.1, 0.9);
          gl_FragColor = vec4(finalColor, alpha);
        }
    </script>

    <script id="coreVertex" type="x-shader/x-vertex">
        uniform float uTime;
        varying vec2 vUv;
        varying float vNoise;

        void main() {
          vUv = uv;
          float noise = snoise(position * 1.5 + uTime * 0.6);
          vNoise = noise;
          vec3 newPosition = position * (0.85 + noise * 0.1);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
    </script>

    <script id="coreFragment" type="x-shader/x-fragment">
        uniform float uTime;
        varying vec2 vUv;
        varying float vNoise;

        void main() {
          float noiseFactor = (vNoise + 1.0) * 0.5;
          vec3 uColorCyan = vec3(0.0, 0.94, 1.0);
          vec3 uColorPurple = vec3(0.43, 0.16, 0.85);
          vec3 uColorMagenta = vec3(0.96, 0.45, 0.71);
          
          vec3 color = mix(uColorPurple, uColorCyan, noiseFactor);
          color = mix(color, uColorMagenta, sin(uTime + vUv.x * 3.0) * 0.5 + 0.5);
          float glow = pow(noiseFactor, 2.0) * 1.5;
          gl_FragColor = vec4(color * glow, 0.8);
        }
    </script>

    <script>
        const snoise = document.getElementById('snoiseFunc').textContent;
        const glassV = snoise + document.getElementById('glassVertex').textContent;
        const glassF = document.getElementById('glassFragment').textContent;
        const coreV = snoise + document.getElementById('coreVertex').textContent;
        const coreF = document.getElementById('coreFragment').textContent;

        let scene, camera, renderer, group;
        const uniforms = {
            uTime: { value: 0 }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3.5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-mount').appendChild(renderer.domElement);

            group = new THREE.Group();
            scene.add(group);

            const geometry = new THREE.IcosahedronGeometry(1.0, 64);

            const coreMat = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: coreV,
                fragmentShader: coreF,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            group.add(new THREE.Mesh(geometry, coreMat));

            const glassMat = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: glassV,
                fragmentShader: glassF,
                transparent: true,
                side: THREE.DoubleSide
            });
            const shell = new THREE.Mesh(geometry, glassMat);
            shell.scale.set(1.05, 1.05, 1.05);
            group.add(shell);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            uniforms.uTime.value = performance.now() * 0.001;
            group.rotation.y += 0.003;
            renderer.render(scene, camera);
        }

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
