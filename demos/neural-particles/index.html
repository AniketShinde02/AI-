<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Particles - Advanced Voice UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="hud-overlay">
        <div class="top-corner left">
            <span class="label">SYSTEM STATUS</span>
            <span class="value">ACTIVE</span>
            <div class="scanline"></div>
        </div>
        <div class="top-corner right">
            <span class="label">CORE LOAD</span>
            <span class="value">12.4%</span>
        </div>
        <div class="bottom-corner left">
            <span class="label">ENCRYPTION</span>
            <span class="value">QUANTUM-READY</span>
        </div>
        <div class="bottom-corner right">
            <span class="label">LOCATION</span>
            <span class="value">NODE-07</span>
        </div>
    </div>

    <div class="main-viz">
        <canvas id="particle-canvas"></canvas>
        <div class="core-glow"></div>
    </div>

    <div class="interaction-hud">
        <div class="voice-status">
            <div class="label">NEURAL INTERFACE</div>
            <div class="status-indicator" id="status-indicator">IDLE</div>
        </div>
        <button class="action-btn" id="mic-btn">
            <div class="btn-inner">
                <i data-lucide="mic"></i>
            </div>
            <svg class="progress-ring" width="100" height="100">
                <circle class="ring-circle" cx="50" cy="50" r="45"></circle>
            </svg>
        </button>
    </div>

    <!-- Audio Permission Overlay -->
    <div id="permission-overlay" class="overlay">
        <div class="overlay-content">
            <div class="glitch-text" data-text="INITIALIZING...">INITIALIZING...</div>
            <p>Establish neural audio link?</p>
            <button id="start-btn" class="hud-btn">ESTABLISH LINK</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
